<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LOVE SAIDA</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #ff1a75 0%, #800040 50%, #2b0018 100%);
}

canvas { display:block; }

.bg-heart{
    position:absolute;
    color:rgba(255,150,200,0.85);
    pointer-events:none;
    animation: floatUp linear forwards;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);opacity:1;}
    100%{transform:translateY(-120vh);opacity:0;}
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const NAME="ЛЮБЛЮ САИДУ";

function heart(t){
    return{
        x:16*Math.pow(Math.sin(t),3),
        y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
    };
}

let bg=[];
for(let i=0;i<3000;i++){
    let t=Math.random()*Math.PI*2;
    let p=heart(t);
    bg.push({
        x:p.x,
        y:p.y,
        j:(Math.random()-0.5)*6,
        ph:Math.random()*100
    });
}

function getTextPoints(text){
    let off=document.createElement("canvas");
    let o=off.getContext("2d");

    off.width=1400;
    off.height=420;

    o.fillStyle="black";
    o.fillRect(0,0,off.width,off.height);

    o.font="bold 200px Arial";
    o.textAlign="center";
    o.textBaseline="middle";
    o.fillStyle="white";
    o.fillText(text,off.width/2,off.height/2);

    let d=o.getImageData(0,0,off.width,off.height).data;

    let pts=[];

    for(let y=0;y<off.height;y+=6){
        for(let x=0;x<off.width;x+=6){
            let i=(y*off.width+x)*4;
            if(d[i]>200){
                pts.push({
                    x:(x-off.width/2)/8,
                    y:(y-off.height/2)/8
                });
            }
        }
    }

    return pts;
}

let draw=[];
let lastX=0,lastY=0;

function add(x,y){
    let dx=x-lastX;
    let dy=y-lastY;
    if(Math.sqrt(dx*dx+dy*dy)<10) return;

    lastX=x;
    lastY=y;

    let pts=getTextPoints(NAME);

    for(let i=0;i<pts.length;i+=2){
        draw.push({
            x:x+pts[i].x,
            y:y+pts[i].y,
            life:1
        });
    }
}

let down=false;

onmousedown=e=>{
    down=true;
    lastX=e.clientX;
    lastY=e.clientY;
};

onmouseup=()=>down=false;

onmousemove=e=>{
    if(down) add(e.clientX,e.clientY);
};

ontouchstart=e=>{
    down=true;
    let t=e.touches[0];
    lastX=t.clientX;
    lastY=t.clientY;
};

ontouchend=()=>down=false;

ontouchmove=e=>{
    let t=e.touches[0];
    if(down) add(t.clientX,t.clientY);
};

function anim(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let pulse=1+Math.sin(t*0.002)*0.05;

    bg.forEach(b=>{
        let x=canvas.width/2+b.x*12*pulse;
        let y=canvas.height/2+b.y*12*pulse;

        ctx.fillStyle="rgba(255,180,220,0.9)";
        ctx.beginPath();
        ctx.arc(x,y,1.6,0,Math.PI*2);
        ctx.fill();
    });

    draw.forEach(d=>{
        d.life-=0.012;
        ctx.fillStyle="rgba(255,120,200,"+d.life+")";
        ctx.beginPath();
        ctx.arc(d.x,d.y,2,0,Math.PI*2);
        ctx.fill();
    });

    draw=draw.filter(d=>d.life>0);

    requestAnimationFrame(anim);
}

anim(0);

function createHeart(){
    const el=document.createElement("div");
    el.className="bg-heart";
    el.innerHTML="❤";
    el.style.left=Math.random()*window.innerWidth+"px";
    el.style.bottom="-50px";
    el.style.fontSize=(10+Math.random()*25)+"px";
    el.style.animationDuration=(4+Math.random()*5)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),9000);
}

setInterval(createHeart,70);
</script>
</body>
</html>
