<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наш маленький дневник</title>

<!-- ВАЖНО: ./ -->
<link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="hearts"></div>

<div class="hero">
    <h1>Наш маленький дневник 💗</h1>
    <p>Место, где живут наши воспоминания</p>
    <button onclick="openDiary()">Открыть дневник</button>
</div>

<div id="diary" class="diary">

    <div class="memory right">
        <img src="./image1.jpg">
        <div class="text">
            <h3>Выпускной</h3>
            <p>Именно тогда я влюбился в тебя 💗</p>
        </div>
    </div>

    <div class="memory left">
        <img src="./image2.jpg">
        <div class="text">
            <h3>Первая фотография</h3>
            <p>Самая любимая фотография 💞</p>
        </div>
    </div>

    <div class="memory right">
        <img src="./image3.jpg">
        <div class="text">
            <h3>Ты, я и мое молчание</h3>
            <p>Я не хотел отпускать тебя 💗</p>
        </div>
    </div>

    <div class="memory left">
        <img src="./image4.jpg">
        <div class="text">
            <h3>Моя Абу Стойка</h3>
            <p>Я стеснялся рядом с тобой 😊</p>
        </div>
    </div>

</div>

<script>
function openDiary() {
    document.getElementById("diary").style.display = "block";
}

function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💗";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.querySelector(".hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
