<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LOVE SAIDA</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #ff1a75 0%, #800040 50%, #2b0018 100%);
}

canvas { display:block; }

.bg-heart{
    position:absolute;
    color:rgba(255,150,200,0.85);
    pointer-events:none;
    animation: floatUp linear forwards;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);opacity:1;}
    100%{transform:translateY(-120vh);opacity:0;}
}

.card{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:600px;
    background:white;
    border-radius:20px;
    padding:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    z-index:20;
}

.card video{
    width:100%;
    border-radius:12px;
}
</style>
</head>

<body>

<video controls playsinline preload="auto" style="width:100%; border-radius:12px;">
    <source src="./mls.mp4" type="video/mp4">
</video>

<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

function heart(t){
    return{
        x:16*Math.pow(Math.sin(t),3),
        y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
    };
}

let bg=[];
for(let i=0;i<3000;i++){
    let t=Math.random()*Math.PI*2;
    let p=heart(t);
    bg.push({x:p.x,y:p.y,ph:Math.random()*100});
}

function anim(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let pulse=1+Math.sin(t*0.002)*0.05;

    bg.forEach(b=>{
        let x=canvas.width/2+b.x*12*pulse;
        let y=canvas.height/2+b.y*12*pulse;

        ctx.fillStyle="rgba(255,180,220,0.9)";
        ctx.beginPath();
        ctx.arc(x,y,1.6,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(anim);
}

anim(0);

function createHeart(){
    const el=document.createElement("div");
    el.className="bg-heart";
    el.innerHTML="❤️";
    el.style.left=Math.random()*window.innerWidth+"px";
    el.style.bottom="-50px";
    el.style.fontSize=(10+Math.random()*25)+"px";
    el.style.animationDuration=(4+Math.random()*5)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),9000);
}

setInterval(createHeart,70);
</script>

</body>
</html>
