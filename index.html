<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pink Heart Site</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Переливающийся фон */
body {
  background: linear-gradient(45deg, #ff4da6, #ff99cc, #ff66b2, #ffb3d9);
  background-size: 400% 400%;
  animation: gradient 10s ease infinite;
}

@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Тёмный розовый туман сверху */
.fog {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(80,0,40,0.6), transparent);
  pointer-events: none;
}

/* Центр кнопка */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
}

button {
  padding: 20px 40px;
  font-size: 20px;
  border: none;
  border-radius: 30px;
  background: #ff1f8f;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 20px #ff1f8f;
}

button:hover {
  transform: scale(1.05);
}

/* Видео блок */
#videoBox {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
}

video {
  width: 400px;
  border-radius: 15px;
  box-shadow: 0 0 30px black;
}

/* Сердца */
.heart {
  position: absolute;
  color: #ff0066;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  from {transform: translateY(-10%); opacity: 1;}
  to {transform: translateY(110vh); opacity: 0;}
}
</style>
</head>

<body>

<div class="fog"></div>

<div class="center">
  <button onclick="showVideo()">💗 Нажми меня 💗</button>
</div>

<div id="videoBox">
  <!-- ВСТАВЬ СВОЮ ССЫЛКУ НА ВИДЕО -->
  <video controls autoplay>
    <source src="YOUR_VIDEO_URL_HERE.mp4" type="video/mp4">
  </video>
</div>

<script>
// показ видео
function showVideo() {
  document.querySelector(".center").style.display = "none";
  document.getElementById("videoBox").style.display = "block";
}

// падающие сердца
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 30) + "px";
  heart.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
