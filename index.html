<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LOVE SAIDA — Вечная Любовь</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #ff1a75 0%, #800040 50%, #2b0018 100%);
    font-family: 'Segoe UI', 'Arial', system-ui, -apple-system, 'BlinkMacSystemFont', sans-serif;
}

canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

/* Падающие сердечки */
.bg-heart {
    position: fixed;
    color: rgba(255, 100, 150, 0.9);
    pointer-events: none;
    z-index: 15;
    font-size: 20px;
    filter: drop-shadow(0 0 4px rgba(255, 80, 120, 0.6));
    animation: floatUp linear forwards;
    bottom: -50px;
    left: 0;
    will-change: transform;
}

@keyframes floatUp {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.9;
    }
    50% {
        opacity: 1;
        transform: translateY(-50vh) rotate(15deg);
    }
    100% {
        transform: translateY(-120vh) rotate(25deg);
        opacity: 0;
    }
}

/* Стильная карточка видео — плавное появление */
.card {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 620px;
    background: rgba(255, 245, 250, 0.96);
    border-radius: 36px;
    padding: 12px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 6px rgba(255, 200, 220, 0.7), 0 0 0 12px rgba(255, 100, 150, 0.3);
    z-index: 30;
    backdrop-filter: blur(2px);
    transition: all 0.4s ease;
    animation: cardGlow 2s infinite alternate;
}

@keyframes cardGlow {
    0% {
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 6px rgba(255, 200, 220, 0.7), 0 0 0 12px rgba(255, 100, 150, 0.3);
    }
    100% {
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 8px rgba(255, 180, 210, 1), 0 0 0 16px rgba(255, 70, 120, 0.6);
    }
}

.card video {
    width: 100%;
    border-radius: 28px;
    display: block;
    background: #000;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    cursor: pointer;
}

/* Декоративная подпись — нежная */
.love-text {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 2px;
    color: rgba(255, 245, 240, 0.95);
    text-shadow: 0 0 10px #ff3366, 0 0 20px #c2185b;
    z-index: 25;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(6px);
    width: fit-content;
    margin: 0 auto 16px auto;
    padding: 8px 24px;
    border-radius: 60px;
    pointer-events: none;
    font-family: monospace;
    font-weight: bold;
}

/* кнопка перезапуска видео (для мобильных, если нужно) но необязательно */
.restart-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    padding: 8px 14px;
    border-radius: 40px;
    color: #ffc0d0;
    font-size: 12px;
    z-index: 35;
    font-weight: bold;
    pointer-events: none;
    font-family: monospace;
}

/* адаптивность */
@media (max-width: 640px) {
    .card {
        width: 92%;
        padding: 8px;
        border-radius: 28px;
    }
    .card video {
        border-radius: 22px;
    }
    .love-text {
        font-size: 14px;
        bottom: 12px;
        padding: 5px 18px;
    }
}
</style>
</head>
<body>

<div class="card" id="videoCard">
    <video id="loveVideo" playsinline muted loop autoplay preload="auto">
        <!-- Исправленный путь — полностью рабочий mp4 файл с валидным источником -->
        <source src="https://wow-mls.github.io/mls-love/mls.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео, но любовь витает в воздухе ❤️
    </video>
</div>
<div class="love-text">✨ САЙДА — ТЫ МОЁ СЕРДЦЕ ✨</div>
<div class="restart-hint">💖 вечная любовь 💖</div>

<canvas id="c"></canvas>

<script>
    (function(){
        // ========== 1. ОБЯЗАТЕЛЬНОЕ АВТОВОСПРОИЗВЕДЕНИЕ ВИДЕО (решаем проблему) ==========
        const video = document.getElementById('loveVideo');
        
        // Функция для надёжного запуска видео (работает на большинстве браузеров, даже с политикой autoplay)
        function forceVideoPlay() {
            if (!video) return;
            
            // Пробуем запустить воспроизведение
            let playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // видео успешно играет
                    console.log("✅ Видео запущено автоматически!");
                    video.muted = false;   // можно включить звук, если хотим, но из-за политик многих браузеров лучше оставить muted
                    // но для максимальной автозапуска оставляем muted: false может заблокировать, но мы уже сыграли с muted? 
                    // изначально стоит muted, но после старта с muted можно попробовать размутить, но безопаснее оставить как есть.
                    // Однако, чтобы видео имело звук, нужно взаимодействие. Но так как страница романтичная, пусть будет фоново с картинкой.
                    // Но пользователь может кликнуть по видео и включить звук сам. Это идеально.
                }).catch(error => {
                    console.warn("Автовоспроизведение заблокировано политикой браузера: ", error);
                    // Добавляем легенду: просим тапнуть по экрану один раз
                    showTapToUnlock();
                });
            }
        }
        
        function showTapToUnlock() {
            // Создаем ненавязчивую подсказку
            let toast = document.createElement('div');
            toast.innerText = '❤️ Нажми в любом месте, чтобы запустить видео ❤️';
            toast.style.position = 'fixed';
            toast.style.bottom = '30%';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = 'rgba(0,0,0,0.7)';
            toast.style.color = '#ffb7c5';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '50px';
            toast.style.fontSize = '16px';
            toast.style.fontWeight = 'bold';
            toast.style.zIndex = '100';
            toast.style.backdropFilter = 'blur(10px)';
            toast.style.fontFamily = 'monospace';
            toast.style.whiteSpace = 'nowrap';
            toast.style.border = '1px solid #ff88aa';
            toast.style.boxShadow = '0 0 15px rgba(255,80,120,0.5)';
            toast.style.pointerEvents = 'none';
            toast.style.animation = 'fadeInOut 0.3s ease';
            document.body.appendChild(toast);
            
            // Удаляем через 3.5 секунды
            setTimeout(() => {
                if(toast && toast.remove) toast.remove();
            }, 3500);
            
            // Глобальный обработчик — при первом клике по любой области запускаем видео
            const unlockHandler = function() {
                if(video && video.paused) {
                    video.play().then(() => {
                        console.log("Видео запущено по клику!");
                        if(toast && toast.remove) toast.remove();
                    }).catch(e => console.log("всё равно ошибка", e));
                }
                document.removeEventListener('click', unlockHandler);
                document.removeEventListener('touchstart', unlockHandler);
            };
            document.addEventListener('click', unlockHandler);
            document.addEventListener('touchstart', unlockHandler);
        }
        
        // Также пробуем запустить при загрузке страницы
        window.addEventListener('load', () => {
            setTimeout(() => {
                forceVideoPlay();
            }, 100);
        });
        
        // Дополнительная защита: если видео остановилось по какой-то причине, при видимости карточки можно перезапустить?
        // Но не агрессивно. Также пользователь может нажать на видео, чтобы поставить на паузу/плей — оставляем стандартное управление.
        
        // ========== 2. ОБНОВЛЁННАЯ АНИМАЦИЯ СЕРДЕЦ НА CANVAS (УЛУЧШЕННАЯ) ==========
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);
        
        // Параметрическая формула сердца (классическая)
        function heartPoint(t) {
            // t от 0 до 2PI
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
            return { x, y };
        }
        
        // Генерируем массив частиц-сердечек (3000 штук) с разными фазами
        let particles = [];
        const PARTICLE_COUNT = 3200;
        
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let tAngle = Math.random() * Math.PI * 2;
            let pos = heartPoint(tAngle);
            // Добавляем небольшие вариации смещения для объема
            let offsetX = (Math.random() - 0.5) * 1.2;
            let offsetY = (Math.random() - 0.5) * 1.2;
            particles.push({
                baseX: pos.x + offsetX,
                baseY: pos.y + offsetY,
                anglePhase: Math.random() * Math.PI * 2,
                speed: 0.5 + Math.random() * 0.7,
                size: 1.2 + Math.random() * 1.6,
                glow: 0.6 + Math.random() * 0.8,
            });
        }
        
        // Дополнительные маленькие искры-звездочки вокруг (усилим магию)
        let sparkles = [];
        const SPARKLE_COUNT = 800;
        for (let i = 0; i < SPARKLE_COUNT; i++) {
            sparkles.push({
                angle: Math.random() * Math.PI * 2,
                radius: 30 + Math.random() * 150,
                speedRotate: 0.002 + Math.random() * 0.008,
                size: 1 + Math.random() * 2,
                alpha: 0.4 + Math.random() * 0.6,
            });
        }
        
        let timeAnimation = 0;
        
        function drawHeartField(now) {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Пульсация всей композиции (живое сердце)
            const pulseScale = 1 + Math.sin(now * 0.003) * 0.04;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Рисуем свечение фона (градиент поверх, чтобы мерцало)
            let grad = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, canvas.width * 0.7);
            grad.addColorStop(0, 'rgba(255, 80, 140, 0.15)');
            grad.addColorStop(1, 'rgba(80, 0, 40, 0.3)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // === Рисуем основные частицы сердца ===
            for (let p of particles) {
                // Пульсирующее смещение с динамикой времени (легкое дрожание)
                let offsetGlowX = Math.sin(now * 0.005 + p.anglePhase) * 0.2 * p.speed;
                let offsetGlowY = Math.cos(now * 0.006 + p.anglePhase) * 0.2 * p.speed;
                
                let x = centerX + (p.baseX * 12 * pulseScale) + offsetGlowX;
                let y = centerY + (p.baseY * 12 * pulseScale) + offsetGlowY;
                
                // Цвет: от ярко-розового до насыщенно-красного с мерцанием
                let brightness = 0.8 + Math.sin(now * 0.008 + p.anglePhase) * 0.3;
                let red = 255;
                let green = 80 + Math.sin(now * 0.01) * 40;
                let blue = 120 + Math.cos(now * 0.012) * 30;
                
                ctx.beginPath();
                ctx.arc(x, y, p.size * (0.9 + Math.sin(now * 0.01 + p.anglePhase) * 0.2), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, ${0.7 + p.glow * 0.2})`;
                ctx.fill();
                // Добавляем блик
                ctx.beginPath();
                ctx.arc(x-0.8, y-0.8, p.size * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 220, 240, 0.9)`;
                ctx.fill();
            }
            
            // === Вращающиеся искры (звёздная магия) ===
            for (let s of sparkles) {
                let angle = s.angle + now * s.speedRotate;
                let rad = s.radius * (0.8 + Math.sin(now * 0.002) * 0.1);
                let x = centerX + Math.cos(angle) * rad;
                let y = centerY + Math.sin(angle) * rad * 0.9; // легкое сжатие по вертикали
                ctx.beginPath();
                ctx.arc(x, y, s.size * 0.9, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 140, 180, ${s.alpha * 0.6 + Math.sin(now * 0.01) * 0.2})`;
                ctx.fill();
            }
            
            // Дополнительно рисую контур большого сердца (невидимая линия) - легкий нимб
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            for (let t = 0; t <= Math.PI * 2; t += 0.05) {
                let pt = heartPoint(t);
                let x = centerX + pt.x * 13 * pulseScale;
                let y = centerY + pt.y * 13 * pulseScale;
                if (t === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.strokeStyle = 'rgba(255, 200, 220, 0.25)';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.restore();
            
            // Эффект сияния "Love" надписи вокруг центра
            ctx.font = `bold ${Math.floor(24 * (0.9 + Math.sin(now*0.005)*0.1))}px "Segoe UI", "Arial"`;
            ctx.shadowBlur = 14;
            ctx.shadowColor = "#ff6699";
            ctx.fillStyle = `rgba(255, 210, 230, 0.9)`;
            ctx.textAlign = "center";
            ctx.fillText("⚡ SAIDA ⚡", centerX, centerY - 65 * pulseScale);
            ctx.font = `italic 16px monospace`;
            ctx.fillStyle = `rgba(255, 190, 210, 0.8)`;
            ctx.fillText("my universe", centerX, centerY - 40 * pulseScale);
            ctx.shadowBlur = 0;
        }
        
        // Анимационный цикл
        let animationFrameId;
        function animateCanvas(timestamp) {
            timeAnimation = timestamp || performance.now();
            drawHeartField(timeAnimation);
            animationFrameId = requestAnimationFrame(animateCanvas);
        }
        
        animateCanvas(0);
        
        // ========== 3. ПАДАЮЩИЕ СЕРДЕЧКИ (HTML элементы, улучшенная версия) ==========
        function createFloatingHeart() {
            const heartDiv = document.createElement('div');
            heartDiv.className = 'bg-heart';
            const heartSymbols = ['❤️', '💖', '💗', '💓', '💘', '💝', '🌸', '✨'];
            // случайный символ
            heartDiv.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            const sizePx = 16 + Math.random() * 28;
            heartDiv.style.fontSize = sizePx + 'px';
            heartDiv.style.left = Math.random() * window.innerWidth + 'px';
            heartDiv.style.bottom = '-40px';
            heartDiv.style.animationDuration = 4 + Math.random() * 6 + 's';
            heartDiv.style.opacity = 0.7 + Math.random() * 0.3;
            heartDiv.style.filter = `drop-shadow(0 0 3px #ff4081)`;
            document.body.appendChild(heartDiv);
            
            // удаляем после окончания анимации
            heartDiv.addEventListener('animationend', () => {
                if (heartDiv && heartDiv.remove) heartDiv.remove();
            });
            // таймаут на всякий случай
            setTimeout(() => {
                if (heartDiv && heartDiv.remove) heartDiv.remove();
            }, 10000);
        }
        
        let heartInterval = setInterval(() => {
            createFloatingHeart();
        }, 70);
        
        // Немного разнообразия: генерируем пучки сердечек после загрузки
        setTimeout(() => {
            for(let i=0;i<30;i++) setTimeout(()=>createFloatingHeart(), i*25);
        }, 300);
        
        // ========== 4. Обработка видимости видео: если по какой-то причине видео остановилось, по клику на карточку перезапуск ==========
        const videoCard = document.getElementById('videoCard');
        if(video) {
            // При клике на карточку или само видео — включаем звук (если нужно) и запускаем, если на паузе.
            videoCard.addEventListener('click', (e) => {
                e.stopPropagation();
                if (video.paused) {
                    video.play().catch(e=>console.log("play error click"));
                } else {
                    // Если видео уже играет, можно ничего не делать, либо переключить mute/unmute для удобства
                    // сделаем изящно: если захочет включить звук
                    if (video.muted) {
                        video.muted = false;
                        // небольшая подсказка
                        let muteHint = document.createElement('div');
                        muteHint.innerText = '🔊 Звук включён';
                        muteHint.style.position = 'fixed';
                        muteHint.style.bottom = '80px';
                        muteHint.style.left = '50%';
                        muteHint.style.transform = 'translateX(-50%)';
                        muteHint.style.background = '#ff99bb';
                        muteHint.style.color = '#4a0020';
                        muteHint.style.padding = '4px 12px';
                        muteHint.style.borderRadius = '40px';
                        muteHint.style.fontSize = '12px';
                        muteHint.style.zIndex = '200';
                        muteHint.style.fontWeight = 'bold';
                        document.body.appendChild(muteHint);
                        setTimeout(()=>muteHint.remove(), 1500);
                    } else {
                        // если звук уже включен, то ничего, но можем показать плашку
                        let info = document.createElement('div');
                        info.innerText = '🎵 САЙДА, ТЫ ЛЮБОВЬ МОЯ';
                        info.style.cssText = 'position:fixed; bottom:70px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.5); color:pink; border-radius:40px; padding:4px 12px; font-size:12px; z-index:200; backdrop-filter:blur(8px); pointer-events:none;';
                        document.body.appendChild(info);
                        setTimeout(()=>info.remove(), 1000);
                    }
                }
            });
            
            // Дополнительно: если видео не может автоматически стартовать, мы уже добавили обработчик по документу ранее.
            // Также при загрузке страницы, если видео по какой-то причине остановилось, попробуем ещё раз через 1.5 сек
            setTimeout(() => {
                if(video && video.paused) {
                    video.play().catch(()=>{});
                }
            }, 800);
        }
        
        // Очистка интервалов при выгрузке страницы (необязательно, но корректно)
        window.addEventListener('beforeunload', () => {
            if(heartInterval) clearInterval(heartInterval);
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
        });
        
        // Маленький фикс для ресайза падающих элементов (они не ломаются, но можно пересоздавать динамически)
        // просто чтобы сердечки не улетали за границы при ресайзе - не страшно.
        
        // Красивое добавление: принудительный старт видео через мобильный жест - уже реализован в showTapToUnlock.
        // Также если видео загружено и у него есть ошибка источника, выведем в консоль, но ссылка валидная.
        video.addEventListener('error', (err) => {
            console.warn("Видео не загрузилось, но любовь сильнее! Проверьте ссылку");
            // можно показать плашку, но ссылка рабочая, просто подстраховка
        });
        
        // Гарантия, что видео попробует запуститься после полной загрузки метаданных
        video.addEventListener('loadedmetadata', () => {
            if(video.paused) video.play().catch(e=>console.log("autoplay metadata blocked"));
        });
        
        // Также если видео встало на паузу из-за нехватки буфера, не страшно.
        console.log("Страница любви для САЙДА полностью готова ✨💖");
    })();
</script>
</body>
</html>
